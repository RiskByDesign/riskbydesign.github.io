<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RiskByDesign</title>
  <meta name="description" content="RiskByDesign is temporarily offline while a few things are finalised.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://riskbydesign.net/">
  <meta name="theme-color" content="#212428">

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .holding {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px;
      gap: 28px;
    }
    .holding .brand-plate { margin-bottom: 12px; }
    .holding h1 {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 600;
      margin: 0;
      color: var(--text);
    }
    .holding p {
      max-width: 520px;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.6;
      margin: 0;
    }
    .holding a { color: var(--accent-bright); text-decoration: underline; text-underline-offset: 3px; }
    .holding .footer-note {
      margin-top: 24px;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="holding">
    <span class="brand-plate"><img class="brand-logo" src="/assets/riskbydesign-logo.png" alt="RiskByDesign" width="132" height="72"></span>
    <h1>Temporarily offline</h1>
    <p>
      RiskByDesign is briefly paused while a few things are finalised behind the
      scenes. Content will be back shortly.
    </p>
    <p>
      Need to get in touch in the meantime? Email
      <a href="mailto:cyber@riskbydesign.net">cyber@riskbydesign.net</a>.
    </p>
    <p class="footer-note">&copy; <span id="year">2026</span> RiskByDesign</p>
  </main>
  <script>
    var y = document.getElementById('year');
    if (y) y.textContent = String(new Date().getFullYear());
  </script>
</body>
</html>
